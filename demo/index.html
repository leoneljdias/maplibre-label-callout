<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>maplibre-label-callout demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0e1210;
      }
      #map {
        position: absolute;
        inset: 0;
      }

      /* header */
      .header {
        position: fixed;
        top: 12px;
        left: 12px;
        right: 12px;
        z-index: 10;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 13px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .header-top {
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 6px;
      }
      .header-top h1 {
        font-size: 15px;
        font-weight: 600;
        color: #16150f;
        margin: 0;
      }
      .header-top .desc {
        color: #64748b;
        font-size: 13px;
      }
      .header-author {
        font-size: 11px;
        color: #94a3b8;
      }
      .header-author a {
        color: #64748b;
        text-decoration: none;
        font-weight: 500;
      }
      .header-author a:hover {
        color: #16150f;
      }
      .header-bottom {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .header .badges {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
      }
      .header .badges img {
        height: 20px;
        display: block;
      }
      .header .btns {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-left: auto;
      }
      @media (max-width: 374px) {
        .header .btns {
          margin-left: 0;
          width: 100%;
          flex-direction: column;
        }
        .header .btns a {
          width: 100%;
          justify-content: center;
        }
      }
      .header .btns a {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 1.5px solid;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .header .btns a.btn-github {
        border-color: #d1d5db;
        color: #374151;
        background: transparent;
      }
      .header .btns a.btn-github:hover {
        background: #f3f4f6;
      }
      .header .btns a.btn-npm {
        border-color: #d1d5db;
        color: #374151;
        background: transparent;
      }
      .header .btns a.btn-npm:hover {
        background: #f3f4f6;
      }
      .header .btns button.btn-globe {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        border-radius: 8px;
        border: 1.5px solid #6ee7b7;
        color: #065f46;
        background: transparent;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .header .btns button.btn-globe:hover {
        background: #d1fae5;
      }
      @media (max-width: 374px) {
        .header .btns a {
          font-size: 12px;
          padding: 5px 12px;
        }
      }

      /* label styling */
      .lc3d-label {
        white-space: nowrap;
      }
      .lc3d-label[data-angle-deg]::after {
        content: attr(data-angle-deg) "°";
        display: block;
        font-size: 10px;
        opacity: 0.6;
        text-align: center;
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <div class="header">
      <div class="header-top">
        <h1>maplibre-label-callout</h1>
        <span class="desc">labels with connector lines at ports worldwide</span>
      </div>
      <div class="header-author">by <a href="https://leoneljdias.pt">leoneljdias</a></div>
      <div class="header-bottom">
        <span class="badges">
          <img
            src="https://img.shields.io/npm/v/@leoneljdias/maplibre-label-callout?color=2563eb"
            alt="v1.0.0"
          />
          <img src="https://img.shields.io/badge/MIT-6b7280" alt="MIT" />
          <img
            src="https://img.shields.io/bundlephobia/min/@leoneljdias/maplibre-label-callout?color=6b7280"
            alt="bundle size"
          />
        </span>
        <span class="btns">
          <button class="btn-globe" id="globeToggle">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M2 12h20" />
              <path
                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
              />
            </svg>
            <span id="globeLabel">Globe</span>
          </button>
          <a class="btn-github" href="https://github.com/leoneljdias/maplibre-label-callout">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
              />
            </svg>
            GitHub
          </a>
          <a
            class="btn-npm"
            href="https://www.npmjs.com/package/@leoneljdias/maplibre-label-callout"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
              />
              <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
              <line x1="12" y1="22.08" x2="12" y2="12" />
            </svg>
            npm
          </a>
        </span>
      </div>
    </div>

    <script src="../dist/index.umd.js"></script>
    <script src="ports.js"></script>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
        center: [2.35, 48.86],
        zoom: 4,
        pitch: 50,
      });

      map.on("load", () => {
        map.getStyle().layers.forEach((l) => {
          if (l.layout && l.layout["text-field"]) {
            map.setLayoutProperty(l.id, "visibility", "none");
          }
        });

        const globeBtn = document.getElementById("globeToggle");
        const globeLabel = document.getElementById("globeLabel");
        let isGlobe = false;
        let savedPitch = map.getPitch();
        let savedBearing = map.getBearing();
        globeBtn.addEventListener("click", () => {
          isGlobe = !isGlobe;
          if (isGlobe) {
            savedPitch = map.getPitch();
            savedBearing = map.getBearing();
            map.setProjection({ type: "globe" });
            map.jumpTo({ pitch: 0, bearing: 0 });
            globeLabel.textContent = "Mercator";
          } else {
            map.setProjection({ type: "mercator" });
            map.jumpTo({ pitch: savedPitch, bearing: savedBearing });
            globeLabel.textContent = "Globe";
          }
        });
        const schemes = [
          { bg: "#a8d8ea", text: "#1a365d", line: "#2980b9", border: "#7ec8e3" },
          { bg: "#f4acb7", text: "#7f1d1d", line: "#c0392b", border: "#e8909e" },
          { bg: "#b5e2c0", text: "#14532d", line: "#27ae60", border: "#96d6a7" },
          { bg: "#f8edb5", text: "#713f12", line: "#b8860b", border: "#f0e096" },
          { bg: "#d4b8e0", text: "#4a1d6e", line: "#8e44ad", border: "#c4a0d4" },
          { bg: "#fad4a8", text: "#7c2d12", line: "#d35400", border: "#f0c08a" },
          { bg: "#f8c8dc", text: "#831843", line: "#d45d79", border: "#f0b0cc" },
        ];
        function pick(id) {
          let h = 0;
          for (let i = 0; i < id.length; i++) h = (h << 5) - h + id.charCodeAt(i);
          return schemes[Math.abs(h) % schemes.length];
        }
        PORTS_DATA.features.forEach((f) => {
          const s = pick(f.properties.portid);
          f.properties.c_bg = s.bg;
          f.properties.c_text = s.text;
          f.properties.c_line = s.line;
          f.properties.c_border = s.border;
        });
        const callouts = new LineCallout3D(map, {
          data: PORTS_DATA,
          idProperty: "portid",
          priority: (p) => p.vessel_count_total || 0,
          template: (p) => `
          <div style="font-weight:600;letter-spacing:-.01em;color:${p.c_text}">${p.portname}</div>
          <div style="color:${p.c_text};opacity:.7;font-size:10.5px">${p.country} · ${(p.vessel_count_total || 0).toLocaleString()} vessels</div>
        `,
          offset: [0, -46],
          maxLabels: 30,
          lineColor: (p) => p.c_line,
          dotColor: (p) => p.c_bg,
          labelBackground: (p) => p.c_bg,
          labelColor: (p) => p.c_text,
          labelBorder: (p) => "1px solid " + p.c_border,
          labelBorderRadius: "8px",
          labelShadow: "0 2px 8px rgba(0,0,0,.08)",
          markerPaint: {
            "circle-radius": [
              "interpolate",
              ["linear"],
              ["get", "vessel_count_total"],
              0,
              2,
              5000,
              7,
            ],
            "circle-color": ["coalesce", ["feature-state", "callout_color"], "#94a3b8"],
            "circle-opacity": 0.85,
            "circle-stroke-width": 0.5,
            "circle-stroke-color": "#ffffff",
          },
          labelPadding: "6px 14px 6px 14px",
          //onClick: (props) => alert(props.portname + ", " + props.country),
        });
      });
    </script>
  </body>
</html>
